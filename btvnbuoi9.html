<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bài tập HTML + JS</title>
</head>
<body>
    <div id="ketqua"></div>
    <script>
            let fullName = "Dong Thi Ha"
            let studentId = "27A4012930"
            let maKhoa = studentId.substring(3, 6);
            let faculty = "";
        
        switch (maKhoa) {
            case "404":
                faculty = "CNTT & KTS";
                break;
            case "408":
                faculty = "KHDL";
                break;
            case "401":
                faculty = "NH - TC";
                break;
            case "403":
                faculty = "QTKD";
                break;
            case "405":
                faculty = "KDQT";
                break;
            case "407":
                faculty = "KT";
                break;
            case "406":
                faculty = "Luật";
                break;
            case "75A":
                faculty = "NN";
                break;
            case "402":
                faculty = "KT-KT";
                break;
            default:
                faculty = "Chưa xác định";
        }
            let arr = fullName.toLowerCase().split(" ");
            let ten = arr[arr.length - 1]; 
            let ho = arr[0]; 
            let dem= arr[1];
            
            let email = ten + ho.charAt(0) +dem.charAt(0)+"."+studentId+ "@hvnh.edu.vn";
            let coursePeriod = studentId.substring(0, 2);


            let last4 = studentId.substring(studentId.length - 4);
            let sum = 0;
            for (let i = 0; i < last4.length; i++) {
                sum += parseInt(last4[i]);
            }

        
            document.getElementById("ketqua").innerHTML =
            "Xin chào " + fullName +
            ", bạn là sinh viên khóa " + coursePeriod +
            ", khoa " + faculty + ", mã sinh viên "+studentId+
            ", tổng 4 số cuối là " + sum + "<br>"+"Email: " + email ;

            
        
    </script>

</body>
</html>
